<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KIRA - Analista Operacional Sênior</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', monospace;
        }

        /* Container principal */
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Canvas para animação 3D */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Overlay de controle */
        .controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(236, 72, 153, 0.3);
        }

        button {
            background: rgba(236, 72, 153, 0.2);
            border: 1px solid #ec4899;
            color: #ec4899;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: monospace;
        }

        button:hover {
            background: #ec4899;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.5);
        }

        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            color: #10b981;
            border-left: 3px solid #10b981;
        }

        .message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            max-width: 80%;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(236, 72, 153, 0.5);
            pointer-events: none;
        }

        .transcript {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            color: #ec4899;
            font-size: 12px;
            max-width: 80%;
            text-align: center;
            font-family: monospace;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .speaking {
            animation: pulse 0.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="canvas-container"></div>
        
        <div class="status" id="status">
            🔴 OFFLINE
        </div>
        
        <div class="message" id="message">
            Clique no botão para falar com a KIRA
        </div>
        
        <div class="transcript" id="transcript">
            
        </div>
        
        <div class="controls">
            <button id="speak-btn" onclick="toggleRecording()">
                🎤 FALAR AGORA
            </button>
            <button id="hands-free" onclick="toggleHandsFree()">
                ✋ MÃOS LIVRES
            </button>
        </div>
    </div>

    <!-- Three.js para animação 3D -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Configuração da cena 3D
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.FogExp2(0x0a0a0f, 0.001);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Partículas para o orbe
        const particleCount = 3000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
            // Distribuição esférica
            const radius = 2.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            positions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i*3+2] = radius * Math.cos(phi);
            
            // Cores: rosa/roxo
            colors[i*3] = 0.9 + Math.random() * 0.1;
            colors[i*3+1] = 0.3 + Math.random() * 0.3;
            colors[i*3+2] = 0.6 + Math.random() * 0.3;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({ 
            size: 0.08, 
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // Orbe central
        const orbGeometry = new THREE.SphereGeometry(1.2, 64, 64);
        const orbMaterial = new THREE.MeshStandardMaterial({
            color: 0xec4899,
            emissive: 0xec4899,
            emissiveIntensity: 0.3,
            metalness: 0.8,
            roughness: 0.2,
            transparent: true,
            opacity: 0.9
        });
        const orb = new THREE.Mesh(orbGeometry, orbMaterial);
        scene.add(orb);

        // Anéis ao redor
        const ringGeometry = new THREE.TorusGeometry(1.8, 0.03, 64, 200);
        const ringMaterial = new THREE.MeshStandardMaterial({ color: 0xec4899, emissive: 0xec4899, emissiveIntensity: 0.5 });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        scene.add(ring);

        const ring2Geometry = new THREE.TorusGeometry(2.2, 0.02, 64, 200);
        const ring2Material = new THREE.MeshStandardMaterial({ color: 0xa855f7, emissive: 0xa855f7, emissiveIntensity: 0.3 });
        const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
        scene.add(ring2);

        // Luzes
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const pointLight = new THREE.PointLight(0xec4899, 1, 30);
        pointLight.position.set(2, 3, 4);
        scene.add(pointLight);
        
        const pointLight2 = new THREE.PointLight(0xa855f7, 0.5);
        pointLight2.position.set(-2, 1, 3);
        scene.add(pointLight2);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(1, 2, 1);
        scene.add(directionalLight);

        // Estrelas de fundo
        const starCount = 1500;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // Variáveis de animação
        let time = 0;
        let isSpeaking = false;
        let scaleSpeed = 0.02;
        let originalParticlePositions = positions.slice();

        // Animação
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01;
            
            // Rotação dos anéis
            ring.rotation.x = Math.sin(time * 0.5) * 0.3;
            ring.rotation.y = time * 0.5;
            ring.rotation.z = Math.cos(time * 0.3) * 0.2;
            
            ring2.rotation.x = Math.cos(time * 0.4) * 0.2;
            ring2.rotation.y = time * 0.3;
            ring2.rotation.z = Math.sin(time * 0.5) * 0.3;
            
            // Partículas orbitando
            particleSystem.rotation.y = time * 0.2;
            particleSystem.rotation.x = Math.sin(time * 0.3) * 0.2;
            
            // Estrelas
            stars.rotation.y = time * 0.05;
            
            // Efeito de "fala" - pulsa quando está falando
            if (isSpeaking) {
                const scale = 1 + Math.sin(time * 15) * 0.1;
                orb.scale.set(scale, scale, scale);
                ring.scale.set(scale, scale, scale);
                ring2.scale.set(scale, scale, scale);
                
                // Partículas se expandem
                const positionsAttr = geometry.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    const angle = Math.atan2(positionsAttr[i*3+1], positionsAttr[i*3]);
                    const radius = 2.5 + Math.sin(time * 10 + i * 0.01) * 0.3;
                    positionsAttr[i*3] = Math.cos(angle) * radius;
                    positionsAttr[i*3+1] = Math.sin(angle) * radius;
                }
                geometry.attributes.position.needsUpdate = true;
                
                // Intensidade da luz
                pointLight.intensity = 1 + Math.sin(time * 20) * 0.5;
                orbMaterial.emissiveIntensity = 0.5 + Math.sin(time * 15) * 0.3;
            } else {
                orb.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                ring.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                ring2.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                pointLight.intensity = 0.8;
                orbMaterial.emissiveIntensity = 0.3;
            }
            
            // Câmera suave
            camera.position.x += (0 - camera.position.x) * 0.05;
            camera.position.y += (0 - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        animate();

        // Redimensionamento
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Expor função para controlar animação
        window.setSpeaking = (speaking) => {
            isSpeaking = speaking;
        };
    </script>

    <script>
        // Configuração do servidor
        let SERVER_URL = localStorage.getItem('kira_server') || 'http://localhost:8000';
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let isProcessing = false;
        let handsFreeMode = false;
        let silenceTimeout = null;
        let sessionId = 'sess_' + Math.random().toString(36).substr(2, 8);
        
        const statusDiv = document.getElementById('status');
        const messageDiv = document.getElementById('message');
        const transcriptDiv = document.getElementById('transcript');
        const speakBtn = document.getElementById('speak-btn');
        
        // Atualizar status do servidor
        async function checkServer() {
            try {
                const response = await fetch(`${SERVER_URL}/status`);
                if (response.ok) {
                    const data = await response.json();
                    statusDiv.innerHTML = `🟢 ONLINE | ${data.registros} registros`;
                    statusDiv.style.color = '#10b981';
                    messageDiv.innerHTML = 'KIRA pronta. Clique para falar.';
                    return true;
                }
            } catch (error) {
                statusDiv.innerHTML = '🔴 OFFLINE';
                statusDiv.style.color = '#ef4444';
                messageDiv.innerHTML = 'Servidor offline. Verifique se o backend está rodando.';
            }
            return false;
        }
        
        // Inicializar microfone
        let mediaStream = null;
        
        async function initMicrophone() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                return true;
            } catch (error) {
                console.error('Microfone error:', error);
                messageDiv.innerHTML = '❌ Permissão do microfone negada';
                return false;
            }
        }
        
        // Iniciar gravação
        async function startRecording() {
            if (!mediaStream) {
                const ok = await initMicrophone();
                if (!ok) return;
            }
            
            if (isRecording) return;
            
            audioChunks = [];
            isRecording = true;
            
            const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') 
                ? 'audio/webm;codecs=opus' 
                : 'audio/webm';
            
            mediaRecorder = new MediaRecorder(mediaStream, { mimeType });
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) audioChunks.push(event.data);
            };
            mediaRecorder.onstop = () => sendAudio();
            mediaRecorder.start(200);
            
            messageDiv.innerHTML = '🎙️ Ouvindo... Fale agora';
            speakBtn.innerHTML = '⏹️ PARAR';
            
            // Ativar animação de escuta
            window.setSpeaking(true);
        }
        
        // Parar gravação
        function stopRecording() {
            if (!isRecording) return;
            
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            isRecording = false;
            speakBtn.innerHTML = '🎤 FALAR AGORA';
            messageDiv.innerHTML = 'Processando...';
        }
        
        // Enviar áudio para o servidor
        async function sendAudio() {
            if (audioChunks.length === 0) {
                messageDiv.innerHTML = 'Clique para falar com a KIRA';
                window.setSpeaking(false);
                if (handsFreeMode) setTimeout(startRecording, 500);
                return;
            }
            
            isProcessing = true;
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            
            if (audioBlob.size < 1000) {
                messageDiv.innerHTML = 'Áudio muito curto. Tente novamente.';
                isProcessing = false;
                window.setSpeaking(false);
                if (handsFreeMode) setTimeout(startRecording, 500);
                return;
            }
            
            try {
                // Transcrição
                const formData = new FormData();
                formData.append('audio', audioBlob, 'audio.webm');
                
                const transcribeResponse = await fetch(`${SERVER_URL}/transcribe`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!transcribeResponse.ok) throw new Error('Transcrição falhou');
                
                const { text } = await transcribeResponse.json();
                
                if (!text || text.length < 2) {
                    messageDiv.innerHTML = 'Não entendi. Tente novamente.';
                    isProcessing = false;
                    window.setSpeaking(false);
                    if (handsFreeMode) setTimeout(startRecording, 800);
                    return;
                }
                
                transcriptDiv.innerHTML = `"${text}"`;
                messageDiv.innerHTML = '🤔 Pensando...';
                
                // Chat
                const chatForm = new FormData();
                chatForm.append('text', text);
                chatForm.append('session_id', sessionId);
                
                const chatResponse = await fetch(`${SERVER_URL}/chat`, {
                    method: 'POST',
                    body: chatForm
                });
                
                if (!chatResponse.ok) throw new Error('Chat falhou');
                
                const { answer } = await chatResponse.json();
                
                // Limpar cards e mostrar resposta
                const cleanAnswer = answer.replace(/\{\{CARD:.*?\}\}/g, '').trim();
                messageDiv.innerHTML = cleanAnswer;
                transcriptDiv.innerHTML = '';
                
                // Falar resposta
                window.setSpeaking(true);
                speakText(cleanAnswer);
                
            } catch (error) {
                console.error('Error:', error);
                messageDiv.innerHTML = 'Erro ao processar. Tente novamente.';
                window.setSpeaking(false);
            }
            
            isProcessing = false;
            if (handsFreeMode) setTimeout(startRecording, 800);
        }
        
        // Síntese de voz
        function speakText(text) {
            if (!window.speechSynthesis) return;
            
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text.substring(0, 500));
            utterance.lang = 'pt-BR';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            
            utterance.onend = () => {
                window.setSpeaking(false);
                if (!handsFreeMode) {
                    messageDiv.innerHTML = 'Clique para falar com a KIRA';
                }
            };
            
            utterance.onerror = () => {
                window.setSpeaking(false);
            };
            
            window.speechSynthesis.speak(utterance);
        }
        
        // Toggle gravação
        function toggleRecording() {
            if (isProcessing) return;
            
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
        
        // Modo mãos livres
        function toggleHandsFree() {
            handsFreeMode = !handsFreeMode;
            const btn = document.getElementById('hands-free');
            
            if (handsFreeMode) {
                btn.innerHTML = '✋ MÃOS LIVRES (ATIVO)';
                btn.style.background = '#ec4899';
                btn.style.color = 'white';
                messageDiv.innerHTML = 'Modo mãos livres ativado. Fale quando quiser.';
                if (!isRecording && !isProcessing) {
                    startRecording();
                }
            } else {
                btn.innerHTML = '✋ MÃOS LIVRES';
                btn.style.background = 'rgba(236, 72, 153, 0.2)';
                btn.style.color = '#ec4899';
                messageDiv.innerHTML = 'Modo mãos livres desativado.';
                if (isRecording) {
                    stopRecording();
                }
            }
        }
        
        // Inicialização
        async function init() {
            await checkServer();
            await initMicrophone();
            
            // Verificar servidor periodicamente
            setInterval(checkServer, 30000);
        }
        
        init();
    </script>
</body>
</html>
